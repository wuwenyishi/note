<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工作笔记</title>
    <!-- Gitalk 样式文件 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gitalk@1/dist/gitalk.css">
    <style>
       
        /* 添加响应式和移动端优化的基本样式 */
        body {
            margin: 0;
            padding: 0;
            font-size: 16px;
            line-height: 1.6;
        }

        /* 确保 Gitalk 容器在移动设备上正确显示 */
        #gitalk-container {
            width: 100%;
            max-width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        /* 媒体查询：针对小屏幕设备 */
        @media screen and (max-width: 768px) {
            body {
                font-size: 14px;
            }

            .gitalk-container {
                width: 100%;
                margin: 0 auto;
            }

            /* 调整 Gitalk 的一些样式以适应移动设备 */
            .gitalk-comment {
                width: 100% !important;
            }
        }
    </style>
</head>
<body>

</body>
</html>
